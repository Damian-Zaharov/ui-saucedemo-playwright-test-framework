name: UI Saucedemo Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    # Запускаем на чистой Ubuntu, предоставляемой GitHub
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем код проекта из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Разворачиваем Python версии 3.10
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Кэширование pip ускорит последующие запуски

      # Шаг 3: Устанавливаем зависимости из requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Шаг 4: Устанавливаем системные библиотеки и браузер Chromium для Playwright
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      # Шаг 5: Запускаем тесты в фоновом (headless) режиме
      # Переопределяем флаг --headed из pytest.ini, так как в CI нет монитора
      - name: Run Tests
        run: pytest --no-headed

      # Шаг 6: Сохраняем результаты Allure в артефакты сборки
      - name: Upload Allure Results
        if: always() # Шаг выполнится, даже если тесты упали
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 5
